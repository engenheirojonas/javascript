<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(105,105,173);
            color: white;
            font: normal 20pt arial;
        }

        h1 {
            color: rgb(255, 212, 22);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus distinctio, delectus blanditiis pariatur expedita, totam sequi dolores eaque voluptatum tempora laborum ipsum. Obcaecati optio ea ab sapiente velit corporis incidunt!
    </p>

    <!--o java script incorporado no html deve ser posto no fim antes da tag /body -->
    <script>
        //o comando "window.alert"  apresenta uma notificaçao ou informaçao, é só uma mensagem.
        window.alert('Minha primeira mensagem')
        //o comando "window.confirm"  faz uma pergunta ao usuario que logo tera duas opçoes
        window.confirm('Está gostando do js')
        //o comando "window.prompt"  apresenta uma opcçao ao usuario para inserir alguma resposta ou dado-
        window.prompt('Qual é o seu nome?')

    </script>
</body>
</html>
