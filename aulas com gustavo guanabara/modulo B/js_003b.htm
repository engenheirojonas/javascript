<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(105,105,173);
            color: white;
            font: normal 20pt arial;
        }

        h1 {
            color: rgb(255, 212, 22);
        }
    </style>
</head>
<body>
    <h1>Olá, mundo</h1>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Doloribus distinctio, delectus blanditiis pariatur expedita, totam sequi dolores eaque voluptatum tempora laborum ipsum. Obcaecati optio ea ab sapiente velit corporis incidunt!
        
        
    </p>

    <script>
        // o comando "window.prompt" tem caracteristica de retornar um valor string por padrao apos memorizar um variavel, nao importa os seu tipo primitivo

        // por isso é preciso uma conversao
        /*
        Number.parseInt(n) para numeros reais
        Number.parseFloat(n)  para numeros decimais
     
        "parse" siginifica "converter"
        "n" é o valor a ser convertido.
        */

        var n1 = Number.parseInt(window.prompt('Digite um número: ')) //string
        var n2 = Number.parseInt(window.prompt('Digite outro número: ')) //string

        //concatenaçao
        var s = n1 + n2
        window.alert('A soma dos valores é ' + s)
    </script>
</body>
</html>
