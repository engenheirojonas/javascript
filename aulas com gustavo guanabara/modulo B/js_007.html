<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(68, 125, 199);
            color: white;
            font: normal 18pt arial;
        }

    </style>
</head>
<body>
    <h1>Iniciando estudos DOM</h1>
    <p>aqui vai o resultado</p>
    <p>aprendendo a usar o <strong>DOM</strong> em JavaScript</p>
    <div>Clique em mim</div>


    <script>
        /* Introduçao ao DOM
        é a vertente web do javascript por qual a linguagem foi criada. é uma poderosa ferramente que está dentro do navegador.
        */

        //este comando faz escrever textos no documento html.
        window.document.write('olá, mundo! <br>')


            //BUSCAR CONFIGURAÇOES DO MEU DOCUMENTO HTML
        
        //este comando visualiza a configuraçao o tipo de charset do documento html. 
        window.document.write(window.document.charset)

        /*
        
        //este comando visualiza a configuraçao o nome do navegador do documento html. atençao: o google vai se comportar como Netscape

        window.document.write(window.navigator.appName)

        //este comando visualiza o nome da URL do documento html que eu estou acessando. 

        window.document.write(window.document.URL)

        */

    </script>
    
</body>
</html>
