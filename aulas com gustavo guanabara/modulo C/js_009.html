<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div#area {
            font: normal 20pt arial;
            background: rgb(42, 139, 42);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }

        div#area2 {
            font: normal 20pt arial;
            background: rgb(42, 139, 42);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <H1>MOVER MOUSE PARA DENTRO, FORA DA DIV E CLICAR DENTRO DA DIV</H1>
    <div id="area" onclick="clicar()" onmouseenter="entrar()" onmouseout="sair()">
        interaja comigo
    </div>

    <div id="area2" onclick="clicar2()" onmouseenter="entrar2()" onmouseout="sair2()">
        interaja comigo
    </div>

    <script>
            /* Eventos DOM

                    Os eventos sao coisas que eu posso fazer com um elemento.
                    mas para dispara, acionar ou tratar um evento é preciso fazer o uso duma funçao ou uma funcionalidade.
                
                FUNÇÃO
                    é um conjunto de códigos ou linhas de códigos que váo ser executado só quando o evento ocorrer.

                Bloco
                    as linhas de códigos são chamados tambem de "um bloco"
            
                configurar eventos na parte do html
                    1. criar um atributo de evento no elemento html
                            exemplo: onclick=""

                    2. relacionar tal atributo ao nome duma funçao do javascript
                            exemplo: 

                    3. editar nome da funçao e o bloco de códigos no function
                             function nomedafunçao() {
                                bloco
                             }
            
            */
        var a = window.document.getElementById('area') //liga o elemento javascript ao elemento html

        function clicar() {
            a.innerText = 'Você clicou' 
            a.style.background = 'red'
        }

        function entrar() {
            a.innerText = 'já podes clicar'
        }

        function sair() {
            a.innerText = 'Você Desististe?'
            a.style.background = 'green'
        }

        //declaraçao de variavel para a segunda DIV
        var b = window.document.getElementById('area2')

        //funçoes para a segunda DIV
        function clicar2() {
            b.innerText = 'Você clicou' 
            b.style.background = 'YELLOW'
        }

        function entrar2() {
            b.innerText = 'já podes clicar'
        }

        function sair2() {
            b.innerText = 'interaja de novo comigo'
            b.style.background = 'RED'
        }


    </script>
</body>
</html>
