<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font: normal 18pt arial;
        }

        input {
            font: normal 18pt arial;
        }

        div#res {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Somando os Valores</h1>
        <label for="n1">Primeiro valor: </label>
        <input type="number" name="n1" id="n1">
        <pre>                       + </pre>
        <label for="n2">Primeiro valor: </label>
        <input type="number" name="n2" id="n2">

        <pre>                    <input type="button" value="Somar" onclick="somar()"> </pre>
        
        <div id="res">Resultado</div>
    

    <script>
        function somar() {
            //relacionamento das tags html as variaveis de javascript
            var n1 = window.document.getElementById('n1')
            var n2 = window.document.querySelector('input#n2')
            var res = window.document.getElementById('res')
            
            //conversao de string para numero
            var n1 = Number(n1.value)
            var n2 = Number(n2.value)
            
            var soma = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong> ${soma} </strong>`
        }

        

    </script>
</body>
</html>
